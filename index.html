<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f1ea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #151515;
      padding: 1rem;
    }
    .player {
      width: 100%;
      max-width: 380px;
      background: #fffdf8;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem 1.5rem 1.5rem;
    }
    .cover {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      background: linear-gradient(135deg, #0091ac, #00a9c7);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .cover svg { width: 64px; height: 64px; color: rgba(255,255,255,0.3); }
    .track-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }
    .track-artist {
      font-size: 0.85rem;
      color: #756b61;
      margin-bottom: 1.2rem;
    }
    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #756b61;
      font-variant-numeric: tabular-nums;
      margin-bottom: 0.4rem;
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: #e0ddd7;
      border-radius: 2px;
      margin-bottom: 1.5rem;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #0091ac;
      border-radius: 2px;
      transition: width 0.1s linear;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }
    .ctrl {
      all: unset;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      cursor: pointer;
      color: #151515;
      transition: background 0.2s, color 0.2s;
    }
    .ctrl:hover { background: rgba(0,145,172,0.1); color: #0091ac; }
    .ctrl svg { display: block; }
    .ctrl-main { width: 56px; height: 56px; background: #0091ac; color: #fff; }
    .ctrl-main:hover { background: #007a91; color: #fff; }
    .ctrl-main svg { width: 24px; height: 24px; }
  </style>
</head>
<body>
<div class="player">
  <div class="cover">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
  </div>
  <div class="track-name">BGMusic1</div>
  <div class="track-artist">audio track</div>
  <div class="time-display">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>
  <div class="progress-track" id="progressTrack">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="controls">
    <button class="ctrl" id="rewindBtn" aria-label="Rewind 10s">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path d="M1 4v6h6"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button class="ctrl" id="prevBtn" aria-label="Previous track">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
      </svg>
    </button>
    <button class="ctrl ctrl-main" id="playBtn" aria-label="Play">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <button class="ctrl" id="nextBtn" aria-label="Next track">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path d="M16 6h2v12h-2zm-3.5 6l-8.5 6V6z"/>
      </svg>
    </button>
    <button class="ctrl" id="forwardBtn" aria-label="Forward 10s">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path d="M23 4v6h-6"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const audio = new Audio('BGMusic1.mp3');
  audio.preload = 'auto';

  const tracks = [
    { name: 'BGMusic1', src: 'BGMusic1.mp3', artist: 'audio track' },
    { name: 'BGMusic2', src: 'BGMusic2.mp3', artist: 'audio track' }
  ];
  let currentIdx = 0;
  let isSeeking = false;

  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  const progressFill = document.getElementById('progressFill');
  const progressTrack = document.getElementById('progressTrack');

  function fmt(s) {
    if (!s || !isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function updateTrackDisplay() {
    const t = tracks[currentIdx];
    document.querySelector('.track-name').textContent = t.name;
    document.querySelector('.track-artist').textContent = t.artist;
  }

  function updateMediaSession() {
    if (!('mediaSession' in navigator)) return;
    const t = tracks[currentIdx];
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.name,
      artist: t.artist,
      album: 'TTS Player'
    });
  }

  function setupMediaSession() {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.setActionHandler('play', () => audio.play().catch(() => {}));
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('seekbackward', (details) => {
      const skip = (details.seekOffset || 10);
      audio.currentTime = Math.max(0, audio.currentTime - skip);
    });
    navigator.mediaSession.setActionHandler('seekforward', (details) => {
      const skip = (details.seekOffset || 10);
      audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + skip);
    });
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      const idx = currentIdx > 0 ? currentIdx - 1 : tracks.length - 1;
      loadTrack(idx);
    });
    navigator.mediaSession.setActionHandler('nexttrack', () => {
      loadTrack((currentIdx + 1) % tracks.length);
    });
    navigator.mediaSession.setActionHandler('seekto', (details) => {
      if (details.fastSeek !== undefined && !details.fastSeek) return;
      audio.currentTime = details.seekTime || 0;
    });
  }

  function updatePlayIcon() {
    if (audio.paused) {
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      playBtn.setAttribute('aria-label', 'Play');
    } else {
      playIcon.innerHTML = '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>';
      playBtn.setAttribute('aria-label', 'Pause');
    }
  }

  function loadTrack(index) {
    currentIdx = index;
    audio.src = tracks[index].src;
    audio.load();
    updateTrackDisplay();
    updateMediaSession();
    audio.play().catch(() => {});
  }

  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    currentTimeEl.textContent = fmt(audio.currentTime);
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
  });

  audio.addEventListener('play', () => {
    updatePlayIcon();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  });
  audio.addEventListener('pause', () => {
    updatePlayIcon();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  });
  audio.addEventListener('ended', () => {
    if (currentIdx < tracks.length - 1) {
      loadTrack(currentIdx + 1);
    } else {
      updatePlayIcon();
      progressFill.style.width = '0%';
      currentTimeEl.textContent = '0:00';
    }
  });

  playBtn.addEventListener('click', () => {
    if (audio.src) {
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
    } else {
      loadTrack(0);
    }
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    const idx = currentIdx > 0 ? currentIdx - 1 : tracks.length - 1;
    loadTrack(idx);
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    loadTrack((currentIdx + 1) % tracks.length);
  });

  document.getElementById('rewindBtn').addEventListener('click', () => {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  });

  document.getElementById('forwardBtn').addEventListener('click', () => {
    audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
  });

  progressTrack.addEventListener('click', (e) => {
    const rect = progressTrack.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * (audio.duration || 0);
  });

  updateTrackDisplay();
</script>
</body>
</html>
